services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - backend

  api:
    image: ghcr.io/ganitel/ganitel-backend:latest
    restart: unless-stopped
    env_file: .env
    networks:
      - backend

volumes:
  caddy_data:
  caddy_config:

networks:
  backend:
    driver: bridge
