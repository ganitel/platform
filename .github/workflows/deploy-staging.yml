name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend
  COMPOSE_FILE: packages/backend/docker-compose.staging.yml
  COMPOSE_ENV: packages/backend/.env.staging

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ganitel_test_db
          POSTGRES_USER: ganitel_test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8
      - name: Install dependencies
        run: uv sync --frozen --all-groups
      - name: Run tests
        env:
          ENVIRONMENT: test
          TESTING: "true"
          DATABASE_URL: postgresql://ganitel_test_user:test_password@localhost:5432/ganitel_test_db
          POSTGRES_SERVER: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: ganitel_test_db
          POSTGRES_USER: ganitel_test_user
          POSTGRES_PASSWORD: test_password
          REDIS_URL: redis://localhost:6379/0
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SECRET_KEY: test-secret-key-for-ci-only-minimum-32-characters-long
          DEBUG: "False"
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          REFRESH_TOKEN_EXPIRE_DAYS: 7
        run: uv run pytest -v --tb=short --maxfail=3 --cov=app --cov-report=html --cov-report=term
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: packages/backend/htmlcov/
          retention-days: 30

  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: packages/backend
          target: runtime
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: packages/frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull latest code
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" bash << 'ENDSSH'
          set -e
          cd "${{ secrets.DEPLOY_PATH }}"
          git fetch origin develop
          git reset --hard origin/develop
          git clean -fd
          echo "Deployed commit: $(git rev-parse --short HEAD)"
          ENDSSH

      - name: Backup database
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" bash << 'ENDSSH'
          set -e
          cd "${{ secrets.DEPLOY_PATH }}"
          if docker compose -f ${{ env.COMPOSE_FILE }} --env-file ${{ env.COMPOSE_ENV }} ps --status running 2>/dev/null | grep -q db; then
            mkdir -p backups
            BACKUP_FILE="backups/backup_$(date +%Y%m%d_%H%M%S).sql"
            docker compose -f ${{ env.COMPOSE_FILE }} --env-file ${{ env.COMPOSE_ENV }} exec -T db \
              pg_dump -U ganitel_user ganitel_staging_db > "$BACKUP_FILE" 2>/dev/null || true
            ls -t backups/backup_*.sql 2>/dev/null | tail -n +6 | xargs -r rm
            echo "Backed up to $BACKUP_FILE"
          fi
          ENDSSH

      - name: Pull images and restart services
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          BACKEND_TAG: ${{ github.sha }}
          FRONTEND_TAG: ${{ github.sha }}
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            BACKEND_IMAGE="${{ env.BACKEND_IMAGE }}" \
            FRONTEND_IMAGE="${{ env.FRONTEND_IMAGE }}" \
            GH_TOKEN="$GH_TOKEN" \
            GH_ACTOR="$GH_ACTOR" \
            BACKEND_TAG="$BACKEND_TAG" \
            FRONTEND_TAG="$FRONTEND_TAG" \
            bash << 'ENDSSH'
          set -e
          cd "${{ secrets.DEPLOY_PATH }}"
          echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
          printf 'BACKEND_IMAGE=%s:%s\nFRONTEND_IMAGE=%s:%s\n' \
            "$BACKEND_IMAGE" "$BACKEND_TAG" \
            "$FRONTEND_IMAGE" "$FRONTEND_TAG" > .deploy.env
          docker compose -f ${{ env.COMPOSE_FILE }} --env-file ${{ env.COMPOSE_ENV }} --env-file .deploy.env pull
          docker compose -f ${{ env.COMPOSE_FILE }} --env-file ${{ env.COMPOSE_ENV }} --env-file .deploy.env up -d --remove-orphans
          echo "Services restarted"
          ENDSSH

      - name: Health check
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" bash << 'ENDSSH'
          set -e
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8001/api/v1/health/ > /dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/15..."
            sleep 5
          done
          echo "Health check failed"
          docker compose -f ${{ env.COMPOSE_FILE }} --env-file ${{ env.COMPOSE_ENV }} logs --tail=50 app
          exit 1
          ENDSSH

      - name: Show status
        if: always()
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" bash << 'ENDSSH'
          cd "${{ secrets.DEPLOY_PATH }}"
          docker compose -f ${{ env.COMPOSE_FILE }} --env-file ${{ env.COMPOSE_ENV }} ps
          ENDSSH

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_rsa

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [test, build-backend, build-frontend, deploy]
    if: always()
    steps:
      - name: Send success notification
        if: needs.deploy.result == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Staging deployment successful — ${{ github.sha }}"
          to: ${{ secrets.MAIL_USERNAME }}
          from: "GitHub Actions <${{ secrets.MAIL_USERNAME }}>"
          html_body: |
            <h2>Deployment Successful</h2>
            <p><strong>Commit:</strong> <a href="https://github.com/${{ github.repository }}/commit/${{ github.sha }}">${{ github.sha }}</a></p>
            <p><strong>Actor:</strong> ${{ github.actor }}</p>
            <ul>
              <li><a href="https://staging.ganitel.com">Staging</a></li>
              <li><a href="https://staging.ganitel.com/docs">API Docs</a></li>
              <li><a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">Workflow Logs</a></li>
            </ul>

      - name: Send failure notification
        if: needs.test.result == 'failure' || needs.deploy.result == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Staging deployment failed — ${{ github.sha }}"
          to: ${{ secrets.MAIL_USERNAME }}
          from: "GitHub Actions <${{ secrets.MAIL_USERNAME }}>"
          html_body: |
            <h2>Deployment Failed</h2>
            <p><strong>Commit:</strong> <a href="https://github.com/${{ github.repository }}/commit/${{ github.sha }}">${{ github.sha }}</a></p>
            <p><strong>Actor:</strong> ${{ github.actor }}</p>
            <ul>
              <li>Tests: ${{ needs.test.result }}</li>
              <li>Backend Build: ${{ needs.build-backend.result }}</li>
              <li>Frontend Build: ${{ needs.build-frontend.result }}</li>
              <li>Deploy: ${{ needs.deploy.result }}</li>
            </ul>
            <p><a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Logs</a></p>
