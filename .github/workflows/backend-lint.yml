# Ruff + ty for packages/backend (monorepo root must hold .github for Actions to run).
name: Backend CI

on:
  pull_request:
    paths:
      - "packages/backend/**"
      - ".github/workflows/backend-lint.yml"
  push:
    branches: [main, develop]
    paths:
      - "packages/backend/**"
      - ".github/workflows/backend-lint.yml"

defaults:
  run:
    working-directory: packages/backend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies (incl. dev)
        run: uv sync --frozen --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: ty type check
        run: uv run ty check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies (incl. dev)
        run: uv sync --frozen --all-groups

      - name: App boot smoke test
        # The legacy test suite was removed during the v2 rewrite; new pytest
        # tests will land per feature module. Until then, exercise the import
        # graph + FastAPI factory so a broken module / schema is caught in CI.
        run: |
          uv run python -c "from app.main import create_app; app = create_app(); print(f'routes: {len(app.routes)}')"
