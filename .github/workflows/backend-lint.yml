# Ruff + ty for packages/backend (monorepo root must hold .github for Actions to run).
name: Backend lint

on:
  pull_request:
    paths:
      - "packages/backend/**"
      - ".github/workflows/backend-lint.yml"
  push:
    branches: [main, develop]
    paths:
      - "packages/backend/**"
      - ".github/workflows/backend-lint.yml"

defaults:
  run:
    working-directory: packages/backend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies (incl. dev)
        run: uv sync --frozen --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: ty type check
        run: uv run ty check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ganitel_user
          POSTGRES_PASSWORD: ganitel_local_password_2024
          POSTGRES_DB: ganitel_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies (incl. dev)
        run: uv sync --frozen --all-groups

      - name: Run tests
        env:
          POSTGRES_SERVER: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: ganitel_user
          POSTGRES_PASSWORD: ganitel_local_password_2024
          POSTGRES_DB: ganitel_test_db
          TESTING: "true"
        run: uv run pytest
