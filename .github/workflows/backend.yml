# Ruff + ty for packages/backend (monorepo root must hold .github for Actions to run).
name: Backend CI

on:
  pull_request:
    paths:
      - "packages/backend/**"
      - ".github/workflows/backend.yml"
  push:
    branches: [main, develop]
    paths:
      - "packages/backend/**"
      - ".github/workflows/backend.yml"

defaults:
  run:
    working-directory: packages/backend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync dependencies (incl. dev)
        run: uv sync --frozen --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: ty type check
        run: uv run ty check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync dependencies (incl. dev)
        run: uv sync --frozen --all-groups

      - name: Unit tests
        # `tests/unit/` is pure logic — no env, DB, or app boot.
        # Integration tests (DB-backed) live elsewhere and run separately.
        run: uv run pytest tests/unit/ -v
