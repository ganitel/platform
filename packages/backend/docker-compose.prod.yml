services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ganitel_prod_db}
      POSTGRES_USER: ${POSTGRES_USER:-ganitel_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in .env.prod}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_HOST_PORT:-5432}:5432
    networks:
      - ganitel-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ganitel_user} -d ${POSTGRES_DB:-ganitel_prod_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required in .env.prod}
      - --appendonly
      - yes
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data_prod:/data
    ports:
      - ${REDIS_HOST_PORT:-6379}:6379
    networks:
      - ganitel-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    env_file:
      - .env.prod
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - ${ENV_WORKERS:-3}
      - --limit-max-requests
      - "1000"
      - --timeout-keep-alive
      - "60"
    environment:
      ENVIRONMENT: production
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required in .env.prod}
      ALGORITHM: HS256

      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ganitel_prod_db}
      POSTGRES_USER: ${POSTGRES_USER:-ganitel_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in .env.prod}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ganitel_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ganitel_prod_db}

      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0

      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required in .env.prod}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}

      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required in .env.prod}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required in .env.prod}
      ADMIN_FIRST_NAME: ${ADMIN_FIRST_NAME:-Admin}
      ADMIN_LAST_NAME: ${ADMIN_LAST_NAME:-Ganitel}

      TRANZAK_API_KEY: ${TRANZAK_API_KEY:?TRANZAK_API_KEY is required in .env.prod}
      TRANZAK_APP_ID: ${TRANZAK_APP_ID:?TRANZAK_APP_ID is required in .env.prod}
      TRANZAK_APP_KEY: ${TRANZAK_APP_KEY:?TRANZAK_APP_KEY is required in .env.prod}
      TRANZAK_WEBHOOK_SECRET: ${TRANZAK_WEBHOOK_SECRET:?TRANZAK_WEBHOOK_SECRET is required in .env.prod}
      TRANZAK_WEBHOOK_AUTH_KEY: ${TRANZAK_WEBHOOK_AUTH_KEY:?TRANZAK_WEBHOOK_AUTH_KEY is required in .env.prod}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required in .env.prod}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET is required in .env.prod}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:?FACEBOOK_APP_ID is required in .env.prod}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:?FACEBOOK_APP_SECRET is required in .env.prod}

      ORANGE_MONEY_CLIENT_ID: ${ORANGE_MONEY_CLIENT_ID:?ORANGE_MONEY_CLIENT_ID is required in .env.prod}
      ORANGE_MONEY_CLIENT_SECRET: ${ORANGE_MONEY_CLIENT_SECRET:?ORANGE_MONEY_CLIENT_SECRET is required in .env.prod}
      ORANGE_MONEY_MERCHANT_KEY: ${ORANGE_MONEY_MERCHANT_KEY:?ORANGE_MONEY_MERCHANT_KEY is required in .env.prod}
      MOBILE_MONEY_BASIC_AUTH: ${MOBILE_MONEY_BASIC_AUTH:?MOBILE_MONEY_BASIC_AUTH is required in .env.prod}

      ENV_WORKERS: ${ENV_WORKERS:-3}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-10485760}
    ports:
      - ${APP_HOST_PORT:-8000}:8000
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./migrations:/app/migrations:ro
    networks:
      - ganitel-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G

networks:
  ganitel-network:
    driver: bridge

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local
