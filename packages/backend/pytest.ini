[pytest]
# Configuration pytest pour Ganitel Backend
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ajouter le répertoire racine au PYTHONPATH
pythonpath = .

# Options par défaut
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --cov=app
    --cov-report=term-missing
    --cov-report=html

# Coverage options are always enabled in addopts

# Marqueurs personnalisés
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    e2e: marks tests as end-to-end tests
    external: marks tests that require external services
    payment: marks tests related to payments
    auth: marks tests related to authentication
    booking: marks tests related to bookings
    service: marks tests related to services

# Filtering
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

