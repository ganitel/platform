[project]
name = "ganitel-backend"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.136.0,<0.137",
    "uvicorn[standard]>=0.46.0,<0.47",
    "python-multipart>=0.0.26,<0.1",
    "sqlalchemy>=2.0.49,<3",
    "alembic>=1.18.0,<2",
    "psycopg2-binary>=2.9.12,<3",
    "pydantic>=2.13.0,<3",
    "pydantic-settings>=2.14.0,<3",
    "python-jose[cryptography]>=3.5.0,<4",
    "bcrypt>=5.0.0,<6",
    "cryptography>=46.0.0,<47",
    "pillow>=12.0.0,<13",
    "hiredis>=3.3.0,<4",
    "redis>=7.4.0,<8",
    "httpx>=0.28.0,<0.29",
    "requests>=2.33.0,<3",
    "python-dotenv>=1.2.0,<2",
    "python-dateutil>=2.9.0,<3",
    "pytz>=2026.1,<2027",
    "phonenumbers>=9.0.0,<10",
    "email-validator>=2.3.0,<3",
    "python-magic>=0.4.27,<0.5",
    "sentry-sdk[fastapi]>=2.58.0,<3",
    "orjson>=3.11.1,<4",
    "anyio>=4.13.0,<5",
    "httpcore>=1.0.9,<2",
    "starlette>=1.0.0,<2",
    "slowapi>=0.1.9,<0.2",
    "aioboto3>=15.5.0,<16",
]

[dependency-groups]
dev = [
    "pytest>=9.0.0,<10",
    "pytest-asyncio>=1.3.0,<2",
    "pytest-cov>=7.1.0,<8",
    "pytest-xdist>=3.8.0,<4",
    "pytest-timeout>=2.4.0,<3",
    "pytest-mock>=3.15.0,<4",
    "locust>=2.43.0,<3",
    "bandit>=1.9.0,<2",
    "coverage>=7.13.0,<8",
    "faker>=40.0.0,<41",
    "factory-boy>=3.3.3,<4",
    "responses>=0.26.0,<0.27",
    "psutil>=7.2.0,<8",
    "memory-profiler>=0.61.0,<0.62",
    "requests-mock>=1.12.0,<2",
    "ruff>=0.8.0",
    "ty>=0.0.32",
]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "RUF"]
extend-select = ["UP042"]
ignore = ["E501", "N805", "E402", "B008"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ty.environment]
python-version = "3.11"

[tool.ty.rules]
invalid-method-override = "ignore"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
