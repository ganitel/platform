[project]
name = "ganitel-backend"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "fastapi==0.109.0",
    "uvicorn[standard]==0.27.0",
    "python-multipart==0.0.6",
    "sqlalchemy==2.0.23",
    "alembic==1.13.1",
    "psycopg2-binary>=2.9.10,<3",
    "pydantic>=2.11,<3",
    "pydantic-settings>=2.10,<3",
    "python-jose[cryptography]==3.3.0",
    "passlib[bcrypt]==1.7.4",
    "bcrypt==3.2.2",
    "cryptography==41.0.7",
    "pillow>=12.0.0,<13",
    "hiredis>=3.3.0,<4",
    "redis==5.0.1",
    "httpx==0.26.0",
    "requests==2.31.0",
    "python-dotenv==1.0.0",
    "python-dateutil==2.8.2",
    "pytz==2023.3",
    "phonenumbers==8.13.27",
    "email-validator==2.1.0.post1",
    "python-magic==0.4.27",
    "sentry-sdk[fastapi]==1.39.2",
    "orjson>=3.11.1,<4",
    "anyio==4.2.0",
    "httpcore==1.0.2",
    "starlette==0.35.1",
    "slowapi==0.1.9",
    "aioboto3==13.1.0",
]

[dependency-groups]
dev = [
    "pytest==7.4.3",
    "pytest-asyncio==0.21.1",
    "pytest-cov==4.1.0",
    "pytest-xdist==3.5.0",
    "pytest-timeout==2.2.0",
    "pytest-mock==3.12.0",
    "locust==2.20.0",
    "bandit==1.7.6",
    "coverage==7.3.4",
    "faker==21.0.0",
    "factory-boy==3.3.0",
    "responses==0.24.1",
    "psutil==5.9.6",
    "memory-profiler==0.61.0",
    "requests-mock==1.11.0",
    "ruff>=0.8.0",
    "ty>=0.0.31",
]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "RUF"]
extend-select = ["UP042"]
ignore = ["E501", "N805", "E402", "B008"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ty.environment]
python-version = "3.11"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
