[project]
name = "ganitel-backend"
version = "0.1.0"
description = "Ganitel — Africa-first marketplace for housing, experiences, and payments"
requires-python = ">=3.12"
dependencies = [
    "aioboto3>=15.5.0",
    "alembic>=1.18.4",
    "asyncpg>=0.31.0",
    "email-validator>=2.3.0",
    "fastapi>=0.136.1",
    "geoalchemy2>=0.19.0",
    "httpx>=0.28.1",
    "orjson>=3.11.8",
    "pydantic>=2.13.3",
    "pydantic-settings>=2.14.0",
    "pyjwt[crypto]>=2.12.1",
    "python-multipart>=0.0.26",
    "resend>=2.30.0",
    "shapely>=2.1.2",
    "sqlalchemy[asyncio]>=2.0.49",
    "structlog>=25.5.0",
    "typer>=0.24.2",
    "uvicorn[standard]>=0.46.0",
]

[dependency-groups]
dev = [
    "pre-commit>=4.6.0",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.15.12",
    "ty>=0.0.32",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "RUF", "SIM", "ASYNC", "PL"]
ignore = ["E501", "B008", "PLR0913", "PLR2004", "PLW0603", "PLC0415", "N818"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ty.environment]
python-version = "3.12"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q --strict-markers --tb=short"
markers = [
    "slow: marks tests as slow",
    "integration: requires real Postgres",
    "unit: pure unit tests",
]
filterwarnings = ["ignore::DeprecationWarning"]
