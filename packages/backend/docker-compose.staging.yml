services:
  # ============================================
  # PostgreSQL Database (Staging)
  # ============================================
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ganitel_staging_db}
      POSTGRES_USER: ${POSTGRES_USER:-ganitel_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in .env.staging}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5434}:5432"
    networks:
      - ganitel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ganitel_user} -d ${POSTGRES_DB:-ganitel_staging_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    # In production on VPS, restrict inbound access to this port via firewall/security group.

  # ============================================
  # Redis Cache (Staging)
  # ============================================
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-changeme}
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data_staging:/data
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    networks:
      - ganitel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ============================================
  # FastAPI Application (Staging - Production mode)
  # ============================================
  app:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required (set in .deploy.env)}
    env_file:
      - .env.staging
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - ${ENV_WORKERS:-2}
    environment:
      # Core Settings
      ENVIRONMENT: staging
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      
      # Database
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ganitel_staging_db}
      POSTGRES_USER: ${POSTGRES_USER:-ganitel_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      
      # API Settings
      CORS_ORIGINS: ${CORS_ORIGINS:-https://staging.ganitel.com,https://www.staging.ganitel.com}
      
      # JWT Settings
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      
      # Admin User (Auto-created on first run)
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ganitel.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_FIRST_NAME: ${ADMIN_FIRST_NAME:-Admin}
      ADMIN_LAST_NAME: ${ADMIN_LAST_NAME:-Ganitel}
      
      # Payment Integration (Sandbox)
      TRANZAK_API_KEY: ${TRANZAK_API_KEY}
      TRANZAK_APP_ID: ${TRANZAK_APP_ID}
      TRANZAK_BASE_URL: ${TRANZAK_BASE_URL:-https://dsapi.tranzak.me}
      
      # File Upload
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE: 10485760
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # Server
      ENV_WORKERS: ${ENV_WORKERS:-2}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./migrations:/app/migrations:ro  # Mount migrations directory for alembic
    networks:
      - ganitel-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Expose port to host for nginx reverse proxy
    ports:
      - "${APP_HOST_PORT:-8001}:8000"

  # ============================================
  # Frontend (Staging)
  # ============================================
  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required (set in .deploy.env)}
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
    networks:
      - ganitel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# Nginx config: nginx/staging.conf
# Install to: /etc/nginx/sites-available/staging.ganitel.com
# For host nginx: change upstream server from app:8000 to localhost:8001

# ============================================
# Networks
# ============================================
networks:
  ganitel-network:
    driver: bridge

# ============================================
# Volumes (Persistent Data)
# ============================================
volumes:
  postgres_data_staging:
    driver: local
  redis_data_staging:
    driver: local
