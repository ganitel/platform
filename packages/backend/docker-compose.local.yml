services:
  db:
    # arm64-native PostGIS for Apple Silicon dev; production uses postgis/postgis (x86_64)
    image: imresamu/postgis-arm64:16-3.4
    environment:
      POSTGRES_DB: ganitel
      POSTGRES_USER: ganitel
      POSTGRES_PASSWORD: ganitel
    ports: ["15432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ganitel"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6390:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes: ["miniodata:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin >/dev/null 2>&1; do sleep 1; done;
      /usr/bin/mc mb -p local/ganitel-uploads >/dev/null 2>&1 || true;
      /usr/bin/mc anonymous set download local/ganitel-uploads >/dev/null 2>&1 || true;
      echo 'minio bucket ready';
      "
    restart: "no"

volumes:
  pgdata:
  miniodata:
