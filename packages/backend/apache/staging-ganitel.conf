# ============================================
# APACHE2 CONFIGURATION - STAGING
# ============================================
# Ganitel Backend API - staging.ganitel.com
#
# Installation:
# 1. Save as: /etc/apache2/sites-available/staging.ganitel.com.conf
# 2. Enable modules: sudo a2enmod proxy proxy_http ssl headers rewrite
# 3. Enable site: sudo a2ensite staging.ganitel.com.conf
# 4. Test config: sudo apache2ctl configtest
# 5. Reload Apache: sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName staging.ganitel.com
    ServerAlias www.staging.ganitel.com

    # Redirect HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]

    # Let's Encrypt challenge directory
    Alias /.well-known/acme-challenge /var/www/certbot/.well-known/acme-challenge
    <Directory "/var/www/certbot/.well-known/acme-challenge">
        Require all granted
    </Directory>
</VirtualHost>

<VirtualHost *:443>
    ServerName staging.ganitel.com
    ServerAlias www.staging.ganitel.com
    ServerAdmin admin@ganitel.com

    # SSL Configuration (Let's Encrypt)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/staging.ganitel.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/staging.ganitel.com/privkey.pem

    # Modern SSL settings
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder off
    SSLSessionTickets off

    # HSTS (uncomment after testing)
    # Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"

    # Security Headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "no-referrer-when-downgrade"

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/staging_ganitel_error.log
    CustomLog ${APACHE_LOG_DIR}/staging_ganitel_access.log combined

    # Enable proxy modules
    ProxyRequests Off
    ProxyPreserveHost On
    
    # Proxy to Docker container
    # Docker app runs on localhost:8000
    ProxyPass / http://localhost:8000/
    ProxyPassReverse / http://localhost:8000/

    # WebSocket support (if needed)
    RewriteEngine on
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://localhost:8000/$1" [P,L]

    # File upload size limit
    LimitRequestBody 10485760

    # Timeout settings
    ProxyTimeout 60
    Timeout 60

    # Error pages
    ErrorDocument 502 /502.html
    ErrorDocument 503 /503.html
</VirtualHost>

# vim: syntax=apache ts=4 sw=4 sts=4 sr noet
